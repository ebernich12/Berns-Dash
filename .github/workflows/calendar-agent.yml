name: CalendarAgent Run

on:
  schedule:
    - cron: "0 10 * * *"  # 6am EST daily
  workflow_dispatch:        # manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CalendarAgent session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CANVAS_ICS_URL: ${{ secrets.CANVAS_ICS_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          payload = {
            "agent": "agent_011CaApKVUoCDpmU2hS6H1Pm",
            "environment_variables": {
              "GOOGLE_CLIENT_ID":     os.environ["GOOGLE_CLIENT_ID"],
              "GOOGLE_CLIENT_SECRET": os.environ["GOOGLE_CLIENT_SECRET"],
              "GOOGLE_REFRESH_TOKEN": os.environ["GOOGLE_REFRESH_TOKEN"],
              "FINNHUB_API_KEY":      os.environ["FINNHUB_API_KEY"],
              "FRED_API_KEY":         os.environ["FRED_API_KEY"],
              "CANVAS_ICS_URL":       os.environ["CANVAS_ICS_URL"],
              "INGEST_SECRET":        os.environ["INGEST_SECRET"],
            }
          }

          req = urllib.request.Request(
            "https://api.anthropic.com/v1/sessions",
            data=json.dumps(payload).encode(),
            headers={
              "x-api-key":        os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version": "2023-06-01",
              "anthropic-beta":   "managed-agents-2026-04-01",
              "content-type":     "application/json",
            },
            method="POST"
          )

          try:
            with urllib.request.urlopen(req) as res:
              print(res.read().decode())
          except urllib.error.HTTPError as e:
            print("HTTP Error:", e.code)
            print(e.read().decode())
          EOF
